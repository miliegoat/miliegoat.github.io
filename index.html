<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mae</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
</head>
<body>

<div id="timeOverlay"></div>

<div id="startOverlay" class="overlay">
  <div class="overlay-content">
    <div class="click-label" id="clickLabel">pls click me</div>
    <div class="click-subtitle">type "fuckyou" to see an easter egg</div>
  </div>
</div>

<div class="sidebar-backdrop visible" id="sidebarBackdrop"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-content">
    <div class="logo">
      <h1><span class="logo-m">m</span><span class="logo-il">ae</span></h1>
      <div class="logo-divider" id="logoDivider"></div>
      <div class="logo-subtitle" id="logoSubtitle">hi :)</div>
    </div>

    <div class="sidebar-buttons">
      <button class="sidebar-btn" onclick="window.open('https://discord.com/users/1125787079654260777')">discord</button>
      <button class="sidebar-btn" onclick="window.open('https://github.com/miliegoat')">github</button>
      <button class="sidebar-btn" onclick="window.open('https://github.com/miliegoat/discordrpc-spotifylyrics')">spotifylyrics</button>
      <button class="sidebar-btn" onclick="window.open('https://github.com/miliegoat/osu-beatmapdl-cli')">beatmapdl</button>
      <button class="sidebar-btn" id="guestbookBtn">guestbook</button>
    </div>

    <div class="sidebar-profile" id="sidebarProfile">
      <div class="profile-header">
        <img class="profile-pic" id="profilePic" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="pfp" />
        <div class="profile-info">
          <h3 id="username">loading...</h3>
          <div class="status" id="status">Unknown</div>
        </div>
      </div>
      <div class="profile-divider"></div>
      <div class="profile-footer">
        <div class="profile-text" id="profileText">loading...</div>
        <div class="profile-credit" id="profileCredit">- mil</div>
      </div>
    </div>

    <div class="version-links">
      <a href="v2/" class="version-btn">v2</a>
      <a href="oldsite/" class="version-btn">v1</a>
    </div>
  </div>
</div>

<button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">
  <span id="toggleIcon">&lt;</span>
</button>

<div class="control-buttons" id="controlButtons">
  <button class="control-btn" id="prevBtn">&#9198;</button>
  <button class="control-btn" id="playBtn">&#9654;</button>
  <button class="control-btn" id="nextBtn">&#9197;</button>
</div>

<div class="volume-container" id="volumeContainer">
  <span class="volume-label">VOL</span>
  <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="25" />
  <span class="volume-value" id="volumeValue">50</span>
</div>

<div class="main-content" id="mainContent">
  <div class="now-playing" id="nowPlaying">*</div>
  <div class="song-progress-container">
    <div class="progress-bar-horizontal" id="progressBarBg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-display" id="timeDisplay">0:00</div>
  </div>
  <audio id="musicPlayer"></audio>

  <div class="circle-container" id="circleContainer">
    <canvas class="visualizer-canvas" id="visualizerCanvas"></canvas>
    <div class="spinning-circle" id="spinningCircle"></div>
  </div>
</div>

<div id="guestbookOverlay" class="gb-overlay hidden">
  <div class="gb-panel">
    <div class="gb-header">
      <span>guestbook</span>
      <span id="guestbookStatus">loading...</span>
      <button class="gb-close" id="gbClose">&times;</button>
    </div>
    <form id="guestbookForm" class="gb-form">
      <input id="guestName" class="gb-input" type="text" maxlength="30" placeholder="name" />
      <input id="guestMessage" class="gb-input gb-msg" type="text" maxlength="280" placeholder="write something" required />
      <button type="submit" class="gb-submit">post</button>
      <div id="turnstileWidget" class="gb-turnstile-wrap"></div>
    </form>
    <div id="guestbookEntries" class="gb-body"></div>
    <div class="gb-footer" id="gbFooter"></div>
  </div>
</div>

<script src="v3.js"></script>
</body>
</html>
