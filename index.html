<audio id="audio"></audio>

<script>
  const audio = document.getElementById('audio');
  audio.src = 'ohquesera.mp3';                  // path or URL to audio file
  document.getElementById('trackName').textContent = 'Oh Qué Será? - Willie Colón';
  document.getElementById('albumArt').innerHTML = '<img src="cover.jpg">';

  const audio = document.getElementById('audio');
  let playing = false;

  function togglePlay() {
    if (!audio.src || audio.src === window.location.href) return;
    if (playing) {
      audio.pause();
      document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    } else {
      audio.play();
      document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    }
    playing = !playing;
  }

  function fmt(s) {
    const m = Math.floor(s / 60);
    return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    document.getElementById('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('currentTime').textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('durationEl').textContent = fmt(audio.duration);
  });

  audio.addEventListener('ended', () => {
    playing = false;
    document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('currentTime').textContent = '0:00';
  });

  function seek(e) {
    if (!audio.duration) return;
    const bar = e.currentTarget;
    audio.currentTime = (e.offsetX / bar.clientWidth) * audio.duration;
  }
</script>

</body>
